<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task 1 - DOM Explorer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 40px 20px; }
    .container { max-width: 600px; margin: 0 auto; background: white; padding: 32px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    h1 { font-size: 1.6rem; color: #222; margin-bottom: 16px; }
    p { color: #555; line-height: 1.7; margin-bottom: 12px; font-size: 0.95rem; }
    button { margin-top: 20px; padding: 12px 24px; background: #4f46e5; color: white; border: none; border-radius: 8px; font-size: 0.9rem; cursor: pointer; }
    button:hover { background: #4338ca; }
    #extra-paragraphs { margin-top: 20px; }
    #extra-paragraphs p { background: #f0f0ff; border-left: 3px solid #4f46e5; padding: 10px 14px; border-radius: 4px; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <h1 id="main-heading">Hello, welcome!</h1>
    <p id="first-para">The DOM is a tree of all the elements on your page. JavaScript lets you select and change them.</p>
    <p id="second-para">When you click the button below, JavaScript will create a new paragraph and add it to the page.</p>
    <button id="my-button">Add a new paragraph</button>
    <div id="extra-paragraphs"></div>
  </div>

  <script>
    // a. select each element and log it to the console
    let heading = document.getElementById("main-heading");
    let firstPara = document.getElementById("first-para");
    let secondPara = document.getElementById("second-para");
    let myButton = document.getElementById("my-button");

    console.log("heading:", heading);
    console.log("first paragraph:", firstPara);
    console.log("second paragraph:", secondPara);
    console.log("button:", myButton);

    // b. change the heading text when the page loads
    heading.textContent = "DOM Explorer - Page Ready!";

    // c. add a new paragraph each time the button is clicked
    let count = 0;

    myButton.addEventListener("click", function() {
      count++;
      let newPara = document.createElement("p");
      newPara.textContent = "New paragraph number " + count + " added by JavaScript!";
      document.getElementById("extra-paragraphs").appendChild(newPara);
    });
  </script>
</body>
</html>
